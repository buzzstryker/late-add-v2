# Supabase local config. See https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:54321"
additional_redirect_urls = ["https://127.0.0.1:54321"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Disable runtime JWT verification so our code does getUser(token) with the
# same env as the test. Avoids "Invalid JWT" when the runtime uses a linked
# remote project's keys instead of local.
[functions.get-standings]
verify_jwt = false

[functions.ingest-event-results]
verify_jwt = false

[functions.compute-money-deltas]
verify_jwt = false

[functions.generate-payment-requests]
verify_jwt = false

[functions.review]
verify_jwt = false

[functions.standings-player-history]
verify_jwt = false
